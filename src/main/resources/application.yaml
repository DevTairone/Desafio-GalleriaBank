spring:
  application:
    name: compras

  datasource:
    url: jdbc:postgresql://localhost:5432/galleriabank_compras
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    user:
      name: admin
      # Senha 'adminpassword' criptografada com BCrypt
      password: "$2a$10$vI8Z8n3Q1R6Y6S6/kY5u5.8P.u6q8lW6Z.eIe/9oUv1p7r8vW9W6e"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

server:
  port: 8080
  error:
    include-message: always